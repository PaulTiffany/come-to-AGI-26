<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat — The Hypothesis Surface</title>
<meta name="description" content="Persistent chat for the Hypothesis Surface / OmegaClaw line of work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #0c0d0c; color: #e8e6df; font-family: 'Oswald', sans-serif; height: 100%; }
  a { color: #e8e6df; }
  a:hover { color: #ffffff; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 24px; display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
  .back { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 1px; text-decoration: none; opacity: 0.6; flex: none; }
  .back:hover { opacity: 1; }
  .kicker { font-family: 'IBM Plex Mono', monospace; font-weight: 300; font-size: 13px; letter-spacing: 4px; color: rgba(232,230,223,0.55); text-transform: uppercase; margin-top: 22px; }
  h1 { font-weight: 500; font-size: 26px; letter-spacing: 2px; margin: 8px 0 10px; }
  .note { font-weight: 300; font-size: 15px; line-height: 1.6; color: rgba(232,230,223,0.75); margin: 0 0 8px; max-width: 640px; }
  .experimental {
    display: inline-block; margin: 10px 0 22px; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(232,230,223,0.55);
    border: 1px solid rgba(232,230,223,0.3); padding: 3px 8px; border-radius: 2px;
  }

  .room { display: flex; flex-direction: column; flex: 1; min-height: 0; border: 1px solid rgba(232,230,223,0.2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .log { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; min-height: 260px; }
  .msg { font-size: 15px; line-height: 1.5; }
  .msg .who { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 1px; color: rgba(232,230,223,0.55); margin-right: 8px; }
  .msg .when { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(232,230,223,0.3); margin-left: 8px; }
  .empty { color: rgba(232,230,223,0.4); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  .namebar, .composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(232,230,223,0.15); background: rgba(255,255,255,0.02); }
  .namebar { display: none; }
  .namebar.active, .composer.active { display: flex; }
  .composer { display: none; }
  input[type=text] {
    flex: 1; background: #141311; border: 1px solid rgba(232,230,223,0.3); color: #e8e6df;
    font-family: 'Oswald', sans-serif; font-size: 15px; padding: 10px 12px; border-radius: 2px; outline: none;
  }
  input[type=text]:focus { border-color: rgba(232,230,223,0.7); }
  button {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    background: rgba(232,230,223,0.1); border: 1px solid rgba(232,230,223,0.4); color: #e8e6df;
    padding: 0 18px; border-radius: 2px; cursor: pointer;
  }
  button:hover { background: rgba(232,230,223,0.18); }
  .status { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 1px; color: rgba(232,230,223,0.4); margin-top: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">&larr; come-to-AGI-26</a>
    <div class="kicker">AGI-26 &middot; San Francisco &middot; 2026</div>
    <h1>Chat</h1>
    <div class="experimental">Experimental &middot; not a final feature</div>
    <p class="note">Persistent chat for work on the Hypothesis Surface and the OmegaClaw line. No login — pick a name and go.</p>

    <div class="room">
      <div class="log" id="log"><div class="empty">connecting&hellip;</div></div>
      <div class="namebar active" id="namebar">
        <input type="text" id="nameInput" placeholder="Your name" maxlength="32" autocomplete="off">
        <button id="nameGo">Join</button>
      </div>
      <div class="composer" id="composer">
        <input type="text" id="msgInput" placeholder="Say something&hellip;" maxlength="500" autocomplete="off">
        <button id="msgGo">Send</button>
      </div>
    </div>
    <div class="status" id="status">not connected</div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // TODO(paul): replace with your Firebase project's web config
  // (Firebase console -> Project settings -> General -> Your apps -> SDK setup and configuration).
  // Realtime Database must be created (test mode is fine to start) at a path "messages".
  const firebaseConfig = {
    apiKey: "REPLACE_ME",
    authDomain: "REPLACE_ME.firebaseapp.com",
    databaseURL: "https://REPLACE_ME-default-rtdb.firebaseio.com",
    projectId: "REPLACE_ME",
  };

  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const namebar = document.getElementById('namebar');
  const composer = document.getElementById('composer');
  const nameInput = document.getElementById('nameInput');
  const nameGo = document.getElementById('nameGo');
  const msgInput = document.getElementById('msgInput');
  const msgGo = document.getElementById('msgGo');

  let name = localStorage.getItem('chat_name') || '';
  if (name) nameInput.value = name;

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function showComposer() {
    namebar.classList.remove('active');
    composer.classList.add('active');
    msgInput.focus();
  }

  if (firebaseConfig.apiKey === "REPLACE_ME") {
    statusEl.textContent = 'not configured yet — see TODO in chat/index.html';
    logEl.innerHTML = '<div class="empty">Chat backend isn\'t wired up yet. This page is ready — it just needs a free Firebase Realtime Database config dropped in.</div>';
  } else {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = query(ref(db, 'messages'), limitToLast(200));

    let first = true;
    onChildAdded(messagesRef, (snap) => {
      if (first) { logEl.innerHTML = ''; first = false; }
      const m = snap.val();
      const div = document.createElement('div');
      div.className = 'msg';
      const t = m.ts ? new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      div.innerHTML = `<span class="who">${escapeHtml(m.name || 'anon')}</span>${escapeHtml(m.text || '')}<span class="when">${t}</span>`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }, (err) => {
      statusEl.textContent = 'connection error: ' + err.message;
    });

    statusEl.textContent = 'connected';
    if (name) showComposer();

    nameGo.addEventListener('click', () => {
      const v = nameInput.value.trim();
      if (!v) return;
      name = v;
      localStorage.setItem('chat_name', name);
      showComposer();
    });
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') nameGo.click(); });

    function send() {
      const text = msgInput.value.trim();
      if (!text || !name) return;
      push(ref(db, 'messages'), { name, text, ts: Date.now() });
      msgInput.value = '';
    }
    msgGo.addEventListener('click', send);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  }
</script>
</body>
</html>
